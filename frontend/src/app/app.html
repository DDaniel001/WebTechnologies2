<mat-toolbar color="primary" class="navbar">
  <span class="logo" routerLink="/">🎮 Game Vault</span>
  
  <span class="spacer"></span>

  <ng-container *ngIf="user$ | async as user; else loggedOut">
    <span class="welcome-text">Hi, {{ user.username }}!</span>
    <button mat-button routerLink="/home">Dashboard</button>
    <button mat-flat-button color="accent" (click)="logout()">
      <mat-icon>logout</mat-icon> Logout
    </button>
  </ng-container>

  <ng-template #loggedOut>
    <button mat-button routerLink="/login">Login</button>
    <button mat-raised-button color="accent" routerLink="/register">Register</button>
  </ng-template>
</mat-toolbar>

<main class="main-content">
  <router-outlet></router-outlet>
</main>
