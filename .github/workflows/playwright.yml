name: E2E Testing with Playwright

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    # Set up a MongoDB container for the backend
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      # 1. Get the code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install backend dependencies and start the server in the background
      - name: Install and Start Backend
        working-directory: ./backend
        env:
          PORT: 3000
          MONGO_URI: mongodb://localhost:27017/testdb
          JWT_SECRET: github_actions_secret
        run: |
          npm install
          node server.js & 

      # 4. Install frontend dependencies and start the Angular app in the background
      - name: Install and Start Frontend
        working-directory: ./frontend
        env:
          NG_CLI_ANALYTICS: false
          CI: true
        run: |
          npm install
          npm start &
        
      # 5. Wait for both servers to be ready before running tests
      - name: Wait for servers
        run: npx --yes wait-on tcp:3000 tcp:4200 -t 120000

      # 6. Install Playwright in the root directory
      - name: Install Playwright
        run: |
          npm install @playwright/test
          npx playwright install --with-deps

      # 7. Run the tests (explicitly pointing to the tests folder)
      - name: Run Playwright tests
        run: npx playwright test tests/